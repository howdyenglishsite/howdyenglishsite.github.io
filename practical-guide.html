<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدليل العملي لتكوين الجملة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيق العام للجسم */
        body {
            background: linear-gradient(160deg,#1e3c72,#2a5298);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1100px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 25px;
            background: #ff416c;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .back-link:hover { background: #ff4b2b; transform: scale(1.05); }

        .file-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 40px;
            border: 2px solid #00ff00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .file-title {
            text-align: center;
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px #000;
        }

        iframe {
            width: 100%;
            height: 700px; 
            border: none;
            border-radius: 10px;
            background: white;
        }

        /* ===== نظام شريط التواصل المطور (المطلوب) ===== */
        .social-bar{
            position:fixed;
            top:50%;
            left:0;
            transform:translateY(-50%);
            display:flex;
            flex-direction:column;
            padding:1.2rem;
            gap:1.5rem;
            border-radius:0 30px 30px 0;
            z-index:999;
            background: linear-gradient(135deg, #FFD700, #FFB900);
            box-shadow: 5px 0 25px rgba(255, 215, 0, 0.3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-bar a{
            text-decoration:none;
            display:flex;
            align-items:center;
            justify-content:center;
            transition: 0.3s;
        }

        .social-bar i{
            font-size:1.8rem;
            width:55px;
            height:55px;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:50%; 
            color:white;
            position:relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
        }

        .youtube-icon { background: linear-gradient(135deg, #FF0000, #B20000); }
        .facebook-icon { background: linear-gradient(135deg, #1877F2, #0A52B1); }
        .tiktok-icon { background: linear-gradient(135deg, #000000, #333333); border: 1px solid rgba(255,255,255,0.2); }
        .instagram-icon { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }

        .social-bar a:hover i {
            transform: scale(1.2) rotate(10deg);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        /* ميزة التجاوب للهواتف */
        @media screen and (max-width: 767px) {
            body { padding: 10px; padding-bottom: 100px; } /* ترك مساحة للشريط السفلي في الهاتف */
            .container { width: 100%; }
            iframe { height: 500px; }
            .social-bar {
                top: auto; bottom: 0; left: 0; right: 0;
                width: 100%; height: 70px; flex-direction: row; 
                transform: none; padding: 0; justify-content: space-evenly;
                border-radius: 25px 25px 0 0;
            }
            .social-bar i { width: 45px; height: 45px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅ العودة لصفحة الرئيسية</a>

    <div class="container">
        <h1 style="text-align: center; color: #00ff00; text-shadow: 0 0 10px #00ff00; margin-bottom: 30px;">الدليل العملي للمبتدئين في تكوين الجملة</h1>

        <div class="file-section">
            <div class="file-title">الجزء الأول: الأساسيات</div>
            <iframe src="lesson1.html"></iframe>
        </div>

        <div class="file-section">
            <div class="file-title">الجزء الثاني: أدوات النكرة</div>
            <iframe src="lesson2.html"></iframe>
        </div>

        <div class="file-section">
            <div class="file-title">الجزء الثالث: فخ الجمع</div>
            <iframe src="lesson3.html"></iframe>
        </div>

        <div class="file-section">
            <div class="file-title">الجزء الرابع: هيكل الجملة</div>
            <iframe src="lesson4.html"></iframe>
        </div>

        <div class="file-section">
            <div class="file-title">الجزء الخامس: الاختبار النهائي</div>
            <iframe src="lesson5.html"></iframe>
        </div>
    </div>

    <div class="social-bar">
      <a href="https://www.youtube.com/channel/UCFSquuv3GpfUA5RsB3esIfw" target="_blank" title="يوتيوب"><i class="fab fa-youtube youtube-icon"></i></a>
      <a href="https://www.facebook.com/profile.php?id=61588006462049" target="_blank" title="فيسبوك"><i class="fab fa-facebook-f facebook-icon"></i></a>
      <a href="https://www.tiktok.com/@howdy5english" target="_blank" title="تيك توك"><i class="fab fa-tiktok tiktok-icon"></i></a>
      <a href="https://www.instagram.com/howdy5english/" target="_blank" title="انستغرام"><i class="fab fa-instagram instagram-icon"></i></a>
    </div>

    <script>
        /* الأنيميشن التلقائي كما في المثال تماماً */
        const icons = document.querySelectorAll('.social-bar i');
        let index = 0;
        setInterval(() => {
            icons.forEach(i => {
                i.style.transform = "scale(1)";
                i.style.boxShadow = "0 8px 15px rgba(0,0,0,0.3)";
            });
            icons[index].style.transform = "scale(1.2) translateY(-5px) rotate(5deg)";
            icons[index].style.boxShadow = "0 0 20px rgba(255, 255, 255, 0.5), 0 0 40px currentColor";
            index = (index + 1) % icons.length;
        }, 2500);
    </script>

</body>
</html>
