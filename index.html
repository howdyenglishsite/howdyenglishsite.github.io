/* --- الغلاف مع تأثير اللمعان المائل --- */
.cover {

/* الطبقة التي تمر بشكل مائل */
.cover::after {

<script>
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if(panel && panel.classList.contains("panel")){
      var isOpening = panel.style.display !== "block";
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
      if(isOpening){
        var element = this;
        var offsetTop = 0;
        while(element){
          offsetTop += element.offsetTop;
          element = element.offsetParent;
        }
        setTimeout(() => {
          window.scrollTo({ top: offsetTop - 10, behavior: "smooth" });
        }, 150);
      }
    }
  });
}

function createBubble(container){
  const b = document.createElement('div');
  b.classList.add('bubble-tube');
  const size = Math.random()*15 + 10;
  b.style.width = size + 'px'; b.style.height = size + 'px';
  b.style.left = Math.random() * 90 + '%';
  const duration = Math.random() * 4 + 8;
  b.style.animationDuration = duration + 's';
  container.appendChild(b);
  setTimeout(() => b.remove(), duration * 1000);
}
setInterval(() => createBubble(document.getElementById('bubble-container-left')), 400);
setInterval(() => createBubble(document.getElementById('bubble-container-right')), 400);

const socialLinks = document.querySelectorAll(".social-bar a");
let socialIdx = 0;
function runSocialAutoHover() {
  socialLinks.forEach(l => l.classList.remove("auto-hover"));
  socialLinks[socialIdx].classList.add("auto-hover");
  socialIdx = (socialIdx + 1) % socialLinks.length;
}
setInterval(runSocialAutoHover, 1500);

});
</script>
