}
@media (min-width: 768px) { .live-title { font-size: 3rem; } }

@keyframes greenWave { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }

/* --- الغلاف المتجاوب --- */
.cover {
  position: relative;
  width: 95%;
  max-width: 820px;
  height: auto;
  aspect-ratio: 16/7;
  margin: 1rem auto;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.cover img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.cover:hover img { transform: scale(1.05); }

/* --- الأكورديون والأزرار --- */
.accordion, .level-complete {
  width: 95%; max-width: 1100px;
  padding: 14px 20px; margin: 10px auto;
  cursor: pointer; text-align: right;
  border: none; border-radius: 15px;
  transition: 0.3s ease; color: white;
  display: block;
}
.level-complete {
  background: linear-gradient(135deg,#00c9ff,#92fe9d);
  font-weight: bold; text-align: center; font-size: 1.2rem;
}
.accordion { background: linear-gradient(135deg,#6a11cb,#2575fc); font-size: 1.1rem; position: relative; }
.accordion::after { content: "▶"; position: absolute; left: 20px; transition: 0.3s; }
.accordion.active::after { transform: rotate(90deg); }

/* --- لوحات الأكورديون --- */
.panel {
  display: none; width: 95%; max-width: 1100px;
  margin: 0 auto 10px; padding: 1rem;
  background: rgba(0,0,0,0.7); border-radius: 15px;
  backdrop-filter: blur(5px); box-sizing: border-box;
}

/* --- أنابيب جانبية --- */
#bubble-container-left, #bubble-container-right {
  position: fixed; top: 0; width: 2.5rem; height: 100%; pointer-events: none; z-index: 1;
}
#bubble-container-left { left: 0; } #bubble-container-right { right: 0; }
.bubble-tube {
  position: absolute; bottom: 0; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(200,160,255,0.6), rgba(138,43,226,0.3));
  animation: rise 10s linear infinite;
}
@keyframes rise { 0%{transform:translateY(0); opacity:0.7;} 100%{transform:translateY(-110vh); opacity:0;} }

/* --- سبورة التواصل (تحسين التجاوب) --- */
.social-bar {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: #FFD700; display: flex; justify-content: center;
  align-items: center; padding: 0.5rem 0; gap: 0.5rem;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.3); z-index: 1000;
}
.social-bar a {
  color: #000; font-size: 0.7rem; font-weight: bold;
  display: flex; flex-direction: column; align-items: center;
  padding: 5px; border-radius: 8px; transition: 0.3s;
}
@media (min-width: 600px) {

  .social-bar a { font-size: 1rem; flex-direction: row; gap: 8px; }
}

/* تأثير التوهج التلقائي */

<script>
// تفعيل الأكورديون
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if(panel && panel.classList.contains("panel")){
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }
  });
}

// توليد الفقاعات
function createB(c){
  const b=document.createElement('div');
  b.classList.add('bubble-tube');
  const s=Math.random()*15+10;
  b.style.width=s+'px'; b.style.height=s+'px';
  b.style.left=Math.random()*100+'%';
  b.style.animationDuration=(Math.random()*5+5)+'s';
  c.appendChild(b);
  setTimeout(()=>b.remove(),10000);
}
setInterval(()=>createB(document.getElementById('bubble-container-left')), 600);
setInterval(()=>createB(document.getElementById('bubble-container-right')), 600);

// التوهج التلقائي للأيقونات
const links = document.querySelectorAll(".social-bar a");
let idx = 0;
setInterval(() => {
  links.forEach(l => l.classList.remove("auto-hover"));
  links[idx].classList.add("auto-hover");
  idx = (idx + 1) % links.length;
}, 2000);
</script>
