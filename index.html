<style>
/* إعدادات الخط المتجاوب */
html{ font-size: 100%; scroll-behavior:smooth; }
@media screen and (min-width: 768px) { html { font-size: 130%; } }

body{
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  direction:rtl;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;

  color:#f0f8ff;

}

/* --- العنوان الحيوي (متجاوب) --- */
.live-title{
  font-size: 1.8rem;
  font-weight:bold;
  text-align:center;
  margin:1.5rem 0.5rem;
  background:linear-gradient(90deg,#00ff00,#00ffff,#00ff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:300% 100%;
  animation:greenWave 5s linear infinite, floatWave 3s ease-in-out infinite;
  text-shadow:0 0 10px #00ff00;
  display:inline-block;
}
@media screen and (min-width: 768px) { .live-title { font-size: 3rem; } }

/* --- الغلاف (متجاوب) --- */
.cover{
  position:relative;
  width:95%;
  max-width:820px;
  height: auto;
  aspect-ratio: 16 / 9; /* يحافظ على التناسب في كل الشاشات */
  margin:1.5rem auto;
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.cover img{
  width:100%; height:100%; object-fit:cover;
  filter:brightness(90%) saturate(125%) contrast(110%);
  transition: transform 0.3s ease;
}

/* --- الأكورديون (متجاوب) --- */
.accordion{
  width:92%;
  max-width:1200px;
  padding:14px 20px;
  margin:10px auto;
  cursor:pointer;
  text-align:right;
  font-size:1.1rem;
  border:none;
  border-radius:15px;
  box-shadow:0 4px 6px rgba(0,0,0,0.4);
  position:relative;
  transition:all 0.3s ease;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}
.accordion::after{
  content:"▶"; font-size:14px; position:absolute; left:15px; top:50%;
  transform:translateY(-50%) rotate(0deg); transition:transform 0.3s ease;
}
.accordion.active::after{transform:translateY(-50%) rotate(90deg);}

/* --- لوحات الأكورديون --- */
.panel{display:none; width:92%; max-width:1200px; margin:0 auto 1rem auto; padding:1rem; background:#000000bb; border-radius:15px; backdrop-filter:blur(4px); box-sizing: border-box;}
.panel .accordion{background:linear-gradient(135deg,#11998e,#38ef7d); margin-top:10px; font-size:1rem; width:100%;}

/* --- سبورة التواصل الاجتماعي (تعديل جذري للتجاوب) --- */
.social-bar{
  position:fixed; bottom:0; left:0; width:100%; background:#FFD700;
  display:flex; justify-content:center; align-items:center;
  padding:0.5rem 0; gap:0.8rem; box-shadow:0 -3px 10px rgba(0,0,0,0.3); z-index:999;
}
.social-bar a{
  color:#000; text-decoration:none; font-size:0.8rem;
  display:flex; flex-direction: column; align-items:center; gap:2px;
  transition:all 0.3s ease; padding:5px; border-radius:8px;
}
@media screen and (min-width: 600px) {
  .social-bar { gap: 2rem; padding: 0.8rem 0; }
  .social-bar a { font-size: 1.1rem; flex-direction: row; gap: 0.4rem; }
}

/* التوهج التلقائي */
.social-bar a.auto-hover.youtube{background:#ff0000; color:#fff;}
.social-bar a.auto-hover.facebook{background:#1877f2; color:#fff;}
.social-bar a.auto-hover.tiktok{background:#000; color:#fff;}
.social-bar a.auto-hover.instagram{background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); color:#fff;}

/* --- زر المستوى الأول --- */
.level-complete{
  width:92%; max-width:1200px; margin:20px auto; padding:16px;
  font-size:1.2rem; font-weight:bold; text-align:center; border:none;
  border-radius:18px; cursor:pointer; color:white;
  background:linear-gradient(135deg,#00c9ff,#92fe9d);
  box-shadow:0 6px 12px rgba(0,0,0,0.4); transition:0.3s;
}

/* --- فقاعات الأنابيب --- */
#bubble-container-left,#bubble-container-right{position:fixed; top:0; width:2rem; height:100%; pointer-events:none; z-index:1;}
#bubble-container-left{left:0;} #bubble-container-right{right:0;}
.bubble-tube{
  position:absolute; bottom:0; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(200,160,255,0.6), rgba(138,43,226,0.3));
  animation:rise 10s linear infinite;
}

@keyframes rise{ 0%{transform:translateY(0); opacity:0.8;} 100%{transform:translateY(-110vh); opacity:0;} }
@keyframes greenWave{ 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
@keyframes floatWave{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }

.footer-links{ text-align:center; margin:2rem 0; }
.footer-links a{ margin:0 10px; color:#fff; text-decoration:none; font-size:0.9rem; }

</style>

<script>
// الأكورديون
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if (panel && panel.classList.contains("panel")) {
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }
  });
}

// الفقاعات
function createBubble(container) {
  const bubble = document.createElement('div');
  bubble.classList.add('bubble-tube');
  const size = Math.random() * 15 + 10;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDuration = (Math.random() * 4 + 6) + 's';
  container.appendChild(bubble);
  setTimeout(() => bubble.remove(), 10000);
}
setInterval(() => createBubble(document.getElementById('bubble-container-left')), 600);
setInterval(() => createBubble(document.getElementById('bubble-container-right')), 600);

// توهج اجتماعي
const socialLinks = document.querySelectorAll(".social-bar a");
let sIdx = 0;
setInterval(() => {
  socialLinks.forEach(l => l.classList.remove("auto-hover"));
  socialLinks[sIdx].classList.add("auto-hover");
  sIdx = (sIdx + 1) % socialLinks.length;
}, 2000);
</script>
