.cover{

  overflow:hidden;
  border-radius:15px;

}
.cover img{

  font-size:1.1rem;
  border-radius:12px;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
  cursor:pointer;
  transition: 0.3s;
}

/* --- شريط التواصل (تجاوبي للجوال) --- */
.social-bar{

  left:0;

  padding:0.6rem 0;
  gap: 1rem; /* مسافات أصغر للجوال */

  z-index:999;
}
.social-bar a{
  color:#000;
  font-size:0.9rem; /* نص أصغر للجوال */
  display:flex;
  flex-direction: column; /* أيقونة فوق النص في الجوال */
  align-items:center;
  gap:2px;
}

/* --- إعدادات خاصة للشاشات الصغيرة (Mobile) --- */

  .social-bar { gap: 0.8rem; }
  .social-bar a { font-size: 0.7rem; }
  .social-bar i { font-size: 1.1rem; }

/* --- إعدادات خاصة للشاشات الكبيرة (Desktop) --- */
