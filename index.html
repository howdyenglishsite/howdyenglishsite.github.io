/* تحسينات عامة للتجاوب */
html{ font-size:16px; scroll-behavior:smooth; }
@media (min-width: 768px) { html { font-size: 20px; } }

body{
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(160deg,#1e3c72,#2a5298);

  overflow-x:hidden;
  padding-bottom:5rem; /* مساحة أكبر للبار السفلي */
}

/* العنوان الحيوي */
.live-title{
  font-size:1.8rem;
  font-weight:bold;
  text-align:center;
  margin:1.5rem 0;
  background:linear-gradient(90deg,#00ff00,#00ffff,#00ff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:300% 100%;
  animation:greenWave 5s linear infinite;
  text-shadow:0 0 15px rgba(0,255,0,0.5);
}
@media (min-width: 768px) { .live-title { font-size: 3rem; } }

@keyframes greenWave{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

/* الغلاف المتجاوب */
.cover{
  position:relative;
  width:92%;
  max-width:820px;
  height:auto;
  aspect-ratio: 16 / 9; /* يحافظ على تناسق الأبعاد */
  margin:1rem auto;
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.cover img{ width:100%; height:100%; object-fit:cover; transition: 0.5s; }
.cover:hover img { transform: scale(1.05); }

/* الأكورديون */
.accordion, .level-complete{
  width:92%;
  max-width:1100px;
  padding:15px;
  margin:10px auto;
  cursor:pointer;
  border:none;
  border-radius:12px;
  transition:all 0.3s ease;
}

.level-complete {
  background:linear-gradient(135deg,#00c9ff,#92fe9d);
  color:#fff; font-weight:bold; font-size:1.1rem; text-align:center;
}

.accordion{
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
  text-align:right;
  position:relative;
}

.accordion::after{
  content:"\f0da"; font-family:"Font Awesome 5 Free"; font-weight:900;
  position:absolute; left:20px; transition:0.3s;
}
.accordion.active::after{ transform: rotate(90deg); }

.panel{
  display:none; width:92%; max-width:1100px; margin:0 auto 10px auto;
  padding:1rem; background:rgba(0,0,0,0.6); border-radius:12px; backdrop-filter:blur(5px);
}

/* روابط الفوتر القانونية - تصميم جديد */
.footer-links{
  display:flex;
  flex-wrap: wrap;
  justify-content:center;
  gap:10px;
  margin:2rem 0;
  width: 90%;
}

.footer-links a{
  background: rgba(255, 255, 255, 0.1);
  padding: 8px 18px;
  border-radius: 50px;
  color: #fff;
  font-size: 0.8rem;
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}

.footer-links a:hover{
  background: #ff4b2b;
  border-color: #ff4b2b;
}

/* سبورة التواصل الاجتماعي */
.social-bar{
  position:fixed; bottom:0; left:0; width:100%;
  background:#FFD700; display:flex; justify-content:center;
  padding:0.6rem 0; gap:1.5rem; z-index:1000;
}

.social-bar a{ color:#000; font-size:1.1rem; transition:0.3s; display:flex; align-items:center; gap:5px; }

/* فقاعات جانبية */
.bubble-tube{
  position:absolute; bottom:0; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(200,160,255,0.5), rgba(138,43,226,0.2));
  animation:rise 10s linear infinite;
}
@keyframes rise{0%{transform:translateY(0); opacity:1;} 100%{transform:translateY(-110vh); opacity:0;}}

<script>
// الأكورديون
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    this.classList.toggle("active");
    var panel = this.nextElementSibling;
    if (panel && panel.classList.contains('panel')) {
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }
  });
}

// فقاعات
function createBubble(containerId) {
  const container = document.getElementById(containerId);
  const bubble = document.createElement('div');
  bubble.classList.add('bubble-tube');
  const size = Math.random() * 20 + 10;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDuration = (Math.random() * 5 + 7) + 's';
  container.appendChild(bubble);
  setTimeout(() => bubble.remove(), 10000);
}
setInterval(() => { createBubble('bubble-container-left'); createBubble('bubble-container-right'); }, 600);

// تأثير الـ Hover التلقائي
const socialLinks = document.querySelectorAll(".social-bar a");
let currentIdx = 0;
setInterval(() => {
  socialLinks.forEach(l => l.style.transform = "scale(1)");
  socialLinks[currentIdx].style.transform = "scale(1.3)";
  socialLinks[currentIdx].style.color = "#ff4500";
  setTimeout(() => { socialLinks.forEach(l => l.style.color = "#000"); }, 1000);
  currentIdx = (currentIdx + 1) % socialLinks.length;
}, 2000);
</script>
