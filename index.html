@keyframes greenWave { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
@keyframes floatWave { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }

/* --- الغلاف مع تأثير اللمعان --- */
.cover {
  position: relative;

  aspect-ratio: 16/7;
  margin: 1rem auto;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.cover img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s ease;
}
.cover:hover img { transform: scale(1.05); }
.cover::after {
  content: "";
  position: absolute;
  top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);

@keyframes shine { 0%{transform:rotate(0deg) translateX(-100%);} 100%{transform:rotate(0deg) translateX(100%);} }

.accordion { background: linear-gradient(135deg,#6a11cb,#2575fc); font-size: 1.1rem; }
.accordion::after { content: "▶"; position: absolute; left: 20px; transition: 0.3s; font-size: 0.8rem; }
.accordion.active::after { transform: rotate(90deg); }
.accordion:hover { transform: translateY(-3px); box-shadow: 0 8px 12px rgba(0,0,0,0.4); }

/* --- لوحات الأكورديون --- */
.panel {
  display: none; width: 95%; max-width: 1100px;
  margin: 0 auto 10px; padding: 1rem;
  background: rgba(0,0,0,0.7); border-radius: 15px;
  backdrop-filter: blur(5px); box-sizing: border-box;
}

/* --- أنابيب الفقاعات الجمالية --- */
#bubble-container-left, #bubble-container-right {

/* --- سبورة التواصل الاجتماعي (المطورة) --- */

<script>
// تفعيل الأكورديون مع ميزة التمرير السلس (Scroll)
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if(panel && panel.classList.contains("panel")){
      var isOpening = panel.style.display !== "block";
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
      
      if(isOpening){
        var element = this;
        var offsetTop = 0;
        while(element){
          offsetTop += element.offsetTop;
          element = element.offsetParent;
        }
        setTimeout(() => {
          window.scrollTo({ top: offsetTop - 20, behavior: "smooth" });
        }, 200);
      }
    }
  });
}

// توليد الفقاعات الجانبية المتطورة
function createBubble(container){
  const b = document.createElement('div');
  b.classList.add('bubble-tube');
  const size = Math.random()*15 + 10;
  b.style.width = size + 'px'; 
  b.style.height = size + 'px';
  b.style.left = Math.random() * 90 + '%';
  const duration = Math.random() * 5 + 6;
  b.style.animationDuration = duration + 's';
  container.appendChild(b);
  setTimeout(() => b.remove(), duration * 1000);
}

setInterval(() => createBubble(document.getElementById('bubble-container-left')), 500);
setInterval(() => createBubble(document.getElementById('bubble-container-right')), 500);

// نظام التوهج التلقائي للأيقونات (Auto-Hover)
const links = document.querySelectorAll(".social-bar a");
let idx = 0;
function runAutoHover() {
  links.forEach(l => l.classList.remove("auto-hover"));
  links[idx].classList.add("auto-hover");
  idx = (idx + 1) % links.length;
}
setInterval(runAutoHover, 1800);
</script>
