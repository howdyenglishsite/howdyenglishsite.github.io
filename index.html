<style>
/* --- نظام التجاوب التلقائي (Responsive System) --- */
html {

  scroll-behavior: smooth; 
}

@media screen and (min-width: 768px) {

}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  direction: rtl;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(160deg,#1e3c72,#2a5298);
  color: #f0f8ff;
  align-items: center;
  overflow-x: hidden;
  padding-bottom: 5rem;
}

/* --- العنوان الحيوي المتجاوب --- */
.live-title {
  font-size: 1.8rem; /* حجم أصغر للجوال */
  font-weight: bold;
  text-align: center;
  margin: 1.5rem 0;
  background: linear-gradient(90deg,#00ff00,#00ffff,#00ff00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-size: 300% 100%;
  animation: greenWave 5s linear infinite, floatWave 3s ease-in-out infinite;
  text-shadow: 0 0 15px rgba(0,255,0,0.5);
  display: inline-block;
  padding: 0 10px;
}

@media screen and (min-width: 768px) {
  .live-title { font-size: 3rem; }
}

@keyframes greenWave { 0%{background-position:0% 50%;} 50%{background-position:100% 50%;} 100%{background-position:0% 50%;} }
@keyframes floatWave { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }

/* --- الغلاف المتجاوب --- */
.cover {
  position: relative;
  width: 92%;
  max-width: 820px;
  height: auto;
  aspect-ratio: 16 / 7; /* يحافظ على التناسب في كل الشاشات */
  margin: 1rem auto;
  overflow: hidden;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(90%) saturate(125%);
}

.cover::after {
  content: "";
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
  animation: shine 4s linear infinite;
  pointer-events: none;
}
@keyframes shine { 0%{transform:translateX(-100%) translateY(-100%);} 100%{transform:translateX(100%) translateY(100%);} }

/* --- الأكورديون والأزرار --- */
.accordion, .level-complete {
  width: 92%;
  max-width: 1100px;
  padding: 14px 20px;
  margin: 10px auto;
  cursor: pointer;
  text-align: right;
  font-size: 1.1rem;
  border: none;
  border-radius: 15px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.4);
  position: relative;
  transition: all 0.3s ease;
  color: white;
}

.accordion { background: linear-gradient(135deg,#6a11cb,#2575fc); }
.level-complete { background: linear-gradient(135deg,#00c9ff,#92fe9d); font-weight: bold; text-align: center; }

.accordion::after {
  content: "▶";
  font-size: 14px;
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  transition: transform 0.3s;
}

.accordion.active::after { transform: translateY(-50%) rotate(90deg); }
.accordion:hover { transform: translateY(-2px); background: linear-gradient(135deg,#ff416c,#ff4b2b); }

/* --- اللوحات الداخلية --- */
.panel {
  display: none;
  width: 92%;
  max-width: 1100px;
  margin: 0 auto 10px auto;
  padding: 1rem;
  background: rgba(0,0,0,0.7);
  border-radius: 15px;
  backdrop-filter: blur(5px);
  box-sizing: border-box;
}

.panel .accordion {
  background: linear-gradient(135deg,#11998e,#38ef7d);
  font-size: 1rem;
  width: 100%;
}

/* --- أنابيب جانبية زجاجية (أرجوانية) --- */
#bubble-container-left, #bubble-container-right {
  position: fixed;
  top: 0;
  width: 2rem;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}
#bubble-container-left { left: 0; }
#bubble-container-right { right: 0; }

.bubble-tube {
  position: absolute;
  bottom: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(200,160,255,0.7), rgba(138,43,226,0.4));
  animation: rise 10s linear infinite;
}

@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity: 0.7; }
  100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
}

/* --- شريط التواصل الاجتماعي المتجاوب والمتوهج --- */
.social-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #FFD700;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0.6rem 0;
  gap: 0.5rem;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.3);
  z-index: 1000;
}

.social-bar a {
  color: #000;
  text-decoration: none;
  font-size: 0.75rem;
  font-weight: bold;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 5px 8px;
  border-radius: 10px;
  transition: all 0.3s ease;
}

@media screen and (min-width: 600px) {
  .social-bar { gap: 2rem; }
  .social-bar a { font-size: 1.1rem; flex-direction: row; gap: 8px; }
}

/* تأثير التوهج التلقائي المبرمج */
.social-bar a.auto-hover.youtube { background: #ff0000; color: #fff !important; box-shadow: 0 0 15px #ff0000; }

.social-bar a.auto-hover.tiktok { background: #000; color: #fff !important; box-shadow: 0 0 15px #000; }
.social-bar a.auto-hover.instagram { background: linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045); color: #fff !important; box-shadow: 0 0 15px #fd1d1d; }

.footer-links { text-align: center; margin: 2rem 0; width: 100%; }
.footer-links a { margin: 0 10px; color: #fff; text-decoration: none; font-size: 0.9rem; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; }

<script>
// --- الأكورديون المتجاوب ---
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if(panel && panel.classList.contains("panel")){
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }
  });
}

// --- نظام الفقاعات المتجاوب ---
function createBubble(container) {
  const bubble = document.createElement('div');
  bubble.classList.add('bubble-tube');
  const size = Math.random() * 15 + 10;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
  container.appendChild(bubble);
  setTimeout(() => bubble.remove(), 10000);
}
setInterval(() => createBubble(document.getElementById('bubble-container-left')), 600);
setInterval(() => createBubble(document.getElementById('bubble-container-right')), 600);

// --- التوهج التلقائي الذكي لشريط التواصل ---
const socialLinks = document.querySelectorAll(".social-bar a");
let socialIdx = 0;
function autoGlow() {
  socialLinks.forEach(l => l.classList.remove("auto-hover"));
  socialLinks[socialIdx].classList.add("auto-hover");
  socialIdx = (socialIdx + 1) % socialLinks.length;
}
setInterval(autoGlow, 2000);
</script>
