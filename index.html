<style>
/* --- التنسيق العام المتجاوب --- */
html{ font-size:100%; scroll-behavior:smooth; }
@media (min-width: 768px) { html { font-size: 120%; } }

body{
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

  overflow-x:hidden;

}

/* --- العنوان الحيوي (متجاوب) --- */
.live-title{
  font-size:1.8rem;
  font-weight:bold;
  text-align:center;
  margin:1.5rem 0.5rem;
  background:linear-gradient(90deg,#00ff00,#00ffff,#00ff00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-size:300% 100%;
  animation:greenWave 5s linear infinite,floatWave 3s ease-in-out infinite;
  text-shadow:0 0 15px #00ff00,0 0 25px #00ffff;
  display:inline-block;
}
@media (min-width: 768px) { .live-title { font-size: 3rem; } }

/* --- الغلاف (متجاوب) --- */
.cover{
  position:relative;
  width:95%;
  max-width:820px;
  aspect-ratio: 16 / 7;
  margin:1rem auto;
  overflow:hidden;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(90%) saturate(125%);
}

/* --- الأكورديون (تنسيق موحد ومتجاوب) --- */
.accordion{
  width:92%;
  max-width:1100px;
  padding:14px 20px;
  margin:10px auto;
  cursor:pointer;
  text-align:right;
  font-size:1.1rem;
  border:none;
  border-radius:15px;
  box-shadow:0 4px 6px rgba(0,0,0,0.4);
  position:relative;
  transition:all 0.3s ease;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}
.accordion::after{
  content:"▶";
  font-size:14px;
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%) rotate(0deg);
}
.accordion.active::after{transform:translateY(-50%) rotate(90deg);}
.accordion:hover{ transform:translateY(-2px); background:linear-gradient(135deg,#ff416c,#ff4b2b); }

/* --- لوحات الأكورديون --- */
.panel{display:none;width:92%;max-width:1100px;margin:0 auto 1rem auto;padding:1rem;background:#000000bb;border-radius:15px;backdrop-filter:blur(4px);box-sizing:border-box;}
.panel .accordion{background:linear-gradient(135deg,#11998e,#38ef7d); margin-top:10px; font-size:1rem; width:100%;}

/* --- زر تختيم A1-A2 --- */
.level-complete{
  width:92%;
  max-width:1100px;
  margin:15px auto;
  padding:16px;
  font-size:1.2rem;
  font-weight:bold;
  text-align:center;
  border:none;
  border-radius:18px;
  color:white;
  background:linear-gradient(135deg,#00c9ff,#92fe9d);
  box-shadow:0 6px 12px rgba(0,0,0,0.4);
  cursor:pointer;
}

/* --- سبورة التواصل (متجاوبة تماماً) --- */
.social-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#FFD700; 
  display:flex;
  justify-content:center;
  align-items:center;
  padding:0.5rem 0;
  gap:1rem;
  box-shadow:0 -3px 10px rgba(0,0,0,0.3);
  z-index:999;
}
.social-bar a{
  color:#000;
  font-size:0.8rem;
  font-weight:bold;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.3s;
}
@media (min-width: 600px) {
  .social-bar a { font-size: 1.1rem; flex-direction: row; gap: 0.5rem; }
  .social-bar { gap: 2rem; padding: 0.8rem 0; }
}

/* التوهج التلقائي */
.social-bar a.auto-hover.youtube{color:#ff0000; transform:scale(1.1);}
.social-bar a.auto-hover.facebook{color:#1877f2; transform:scale(1.1);}

/* --- أنابيب جانبية --- */
#bubble-container-left,#bubble-container-right{position:fixed;top:0;width:2rem;height:100%;pointer-events:none;z-index:1;}
#bubble-container-left{left:0;} #bubble-container-right{right:0;}
.bubble-tube{
  position:absolute; bottom:0; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(200,160,255,0.6), rgba(138,43,226,0.4));
  animation:rise 10s linear infinite;
}

/* --- الفوتر --- */
.footer-links{ text-align:center; margin:2rem 0; }
.footer-links a{ margin:0 10px; color:#fff; font-size:0.9rem; background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:5px; }

@keyframes rise{0%{transform:translateY(0);opacity:0.8;}100%{transform:translateY(-110vh);opacity:0;}}
@keyframes greenWave{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}
@keyframes floatWave{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

</style>

<script>
// الأكورديون
var acc = document.getElementsByClassName("accordion");
for (var i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function() {
    var panel = this.nextElementSibling;
    if(panel && panel.classList.contains("panel")){
      this.classList.toggle("active");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    }
  });
}

// الفقاعات
function createBubble(container){
  const bubble = document.createElement('div');
  bubble.classList.add('bubble-tube');
  const size = Math.random()*15+10;
  bubble.style.width = size+'px';
  bubble.style.height = size+'px';
  bubble.style.left = Math.random()*100+'%';
  bubble.style.animationDuration = (Math.random()*4+6)+'s';
  container.appendChild(bubble);
  setTimeout(()=> bubble.remove(), 10000);
}
setInterval(()=> createBubble(document.getElementById('bubble-container-left')), 600);
setInterval(()=> createBubble(document.getElementById('bubble-container-right')), 600);

// توهج اجتماعي تلقائي
const socialLinks = document.querySelectorAll(".social-bar a");
let socialIdx = 0;
setInterval(() => {
  socialLinks.forEach(l => l.classList.remove("auto-hover"));
  socialLinks[socialIdx].classList.add("auto-hover");
  socialIdx = (socialIdx + 1) % socialLinks.length;
}, 2000);
</script>
